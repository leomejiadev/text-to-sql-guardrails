services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/text_to_sql
      - CLIENT_DATABASE_URL=postgresql+psycopg2://test:test@postgres_client:5432/client_test
    depends_on:
      postgres:
        condition: service_healthy
      postgres_client:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      # python:slim no trae curl/wget — usamos urllib de la stdlib
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # pgvector/pgvector:pg15 trae la extensión precompilada; `postgres:15` no.
  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: text_to_sql
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d text_to_sql"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run celery -A app.services.tasks worker --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/text_to_sql
      - CLIENT_DATABASE_URL=postgresql+psycopg2://test:test@postgres_client:5432/client_test
    depends_on:
      postgres:
        condition: service_healthy
      postgres_client:
        condition: service_healthy
      redis:
        condition: service_started

  # Beat corre separado del worker: combinados en un solo proceso dispararía
  # el schedule N veces si hay múltiples réplicas.
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run celery -A app.services.tasks beat --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/text_to_sql
      - CLIENT_DATABASE_URL=postgresql+psycopg2://test:test@postgres_client:5432/client_test
    depends_on:
      postgres:
        condition: service_healthy
      postgres_client:
        condition: service_healthy
      redis:
        condition: service_started

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run celery -A app.services.tasks flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker

  # DB del cliente simulada — mismas credenciales que la DB manual anterior.
  # Los scripts en docker/init_client/ se ejecutan al crear el volumen por primera vez.
  # Puerto 5433 en host para acceso directo desde herramientas locales (DBeaver, psql).
  postgres_client:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: client_test
    volumes:
      - postgres_client_data:/var/lib/postgresql/data
      - ./docker/init_client:/docker-entrypoint-initdb.d
    healthcheck:
      # pg_isready solo confirma que el server acepta conexiones, no que los
      # init scripts terminaron. Pero los scripts corren ANTES de que el server
      # acepte conexiones externas, así que healthy = seed ya aplicado.
      test: ["CMD-SHELL", "pg_isready -U test -d client_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Solo levanta con: docker compose --profile dev up
  # En producción el frontend vive en Vercel — no hace falta correrlo localmente
  # a menos que quieras probar el stack completo contra la API local.
  frontend:
    profiles: [dev]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy

  # Puerto 5434 en host para no colisionar con el postgres de dev en 5432.
  postgres_test:
    image: pgvector/pgvector:pg15
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_text_to_sql
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_client_data:
  redis_data:
