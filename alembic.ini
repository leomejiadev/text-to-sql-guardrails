# Configuración de Alembic — las opciones más pesadas viven en alembic/env.py
# (como la URL de DB y el target_metadata). Este archivo solo tiene lo que
# Alembic necesita leer antes de cargar Python: rutas y logging.

[alembic]
# Carpeta donde viven env.py, script.py.mako y versions/.
script_location = alembic

# Plantilla de nombre para nuevas migraciones. Formato:
#   <timestamp>_<slug>.py  →  p. ej. 20260419_0930_add_query_history.py
# Prefijo por fecha para ordenación cronológica al hacer `ls versions/`.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Zona horaria para los timestamps de las migraciones.
timezone = UTC

# sqlalchemy.url vacío a propósito: la URL real la inyecta env.py desde
# la variable de entorno DATABASE_URL. Dejarla acá la expondría en git.
sqlalchemy.url =


# Configuración de logging — Alembic imprime info útil de cada revisión.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
# WARN: no queremos ver todas las queries de migración en stdout; con WARN
# solo vemos errores y problemas reales.
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
