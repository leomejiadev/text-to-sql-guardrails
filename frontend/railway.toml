[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# VITE_API_URL se configura como variable de entorno en el dashboard de Railway
# Railway la inyecta automáticamente en el ARG del build

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
