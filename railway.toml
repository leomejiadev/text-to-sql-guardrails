# Configuración del servicio principal (API) en Railway.
# Los servicios de Celery se configuran desde el dashboard de Railway
# con el mismo repo pero diferente start command.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway llama a este endpoint para saber si el servicio levantó bien.
# Si no responde 200 en healthcheckTimeout segundos, Railway reinicia el contenedor.
healthcheckPath = "/health"
healthcheckTimeout = 600

# Reiniciar automáticamente si el proceso muere (ej: error no capturado).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
